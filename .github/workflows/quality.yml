name: Validar alteracoes

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - develop
      - "feature/**"
      - "fix/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Testes, qualidade e compilacao
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=moderate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build:pages
