name: Publicar OLI Vinhos em producao

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Versao aprovada para publicar (ex.: v1.1.0)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate:
    name: Validar versao de producao
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_APP_ENV: production
      VITE_CUSTOM_DOMAIN: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Confirmar que a versao aponta para o codigo atual
        shell: bash
        run: |
          git show-ref --verify --quiet "refs/tags/${{ inputs.release_tag }}" || {
            echo "A versao ${{ inputs.release_tag }} nao existe."
            exit 1
          }
          test "$(git rev-list -n 1 "${{ inputs.release_tag }}")" = "$(git rev-parse HEAD)" || {
            echo "A versao nao corresponde ao codigo atual da branch main."
            exit 1
          }
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages
  deploy:
    name: Aprovar e publicar
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
